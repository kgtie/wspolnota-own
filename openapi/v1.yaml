          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreferencesInput'
      responses:
        '200':
          description: Preferencje zapisane
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      updated:
                        type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /me/notifications:
    get:
      tags: [Notifications]
      summary: Lista notyfikacji in-app użytkownika
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        '200':
          description: Lista notyfikacji
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NotificationItem'
                  meta:
                    $ref: '#/components/schemas/CursorMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /me/notifications/{id}/read:
    post:
      tags: [Notifications]
      summary: Oznacz notyfikację jako przeczytaną
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Notyfikacja oznaczona jako przeczytana
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      read_at:
                        type: [string, 'null']
                        format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /parish-approvals/by-code/{code}:
    get:
      tags: [ParishApprovals]
      summary: Pobierz parafianina po 9-cyfrowym kodzie zatwierdzenia
      description: |
        Wymaga `BearerAuth` oraz `email_verified`.
        Dostępne wyłącznie dla administratora parafii lub superadministratora.
        Administrator parafii może pobrać wyłącznie użytkownika przypisanego do jednej z jego aktywnych parafii.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
            pattern: '^\d{9}$'
      responses:
        '200':
          description: Użytkownik znaleziony po kodzie
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/ParishApprovalLookupUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /parish-approvals/{userId}/approve:
    post:
      tags: [ParishApprovals]
      summary: Zatwierdź użytkownika kodem parafialnym
      description: |
        Wymaga `BearerAuth` oraz `email_verified`.
        Administrator parafii może zatwierdzać wyłącznie użytkowników swojej aktywnej parafii.
        Superadministrator może zatwierdzać użytkowników dowolnej aktywnej parafii.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approval_code, parish_id]
              properties:
                approval_code:
                  type: string
                  pattern: '^\d{9}$'
                parish_id:
                  type: integer
      responses:
        '200':
          description: Użytkownik zatwierdzony
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [PARISHIONER_APPROVED]
                      user:
                        $ref: '#/components/schemas/ParishApprovalLookupUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /parish-approvals/pending:
    get:
      tags: [ParishApprovals]
      summary: Lista oczekujących parafian z wyszukiwaniem
      description: |
        Wymaga `BearerAuth` oraz `email_verified`.
        Administrator parafii może przeglądać wyłącznie użytkowników swoich aktywnych parafii.
        `search` działa jako prosty live search po imieniu, loginie i emailu.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: parish_id
          required: true
          schema:
            type: integer
        - in: query
          name: search
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista użytkowników oczekujących na zatwierdzenie
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      parish_id:
                        type: string
                      parish_name:
                        type: [string, 'null']
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/ParishApprovalPendingUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /office/parishes/{parishId}/staff:
    get:
      tags: [Office]
      summary: Lista osób obsługujących kancelarię parafii
      description: |
        Wymaga `email_verified` oraz `parish_approved`.
        Endpoint jest ograniczony do własnej parafii użytkownika i zwraca priorytety odbiorców.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: parishId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista odbiorców kancelarii dla parafii użytkownika
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      parish_id:
                        type: string
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/OfficeStaffMember'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /office/parishes/{parishId}/users:
    get:
      tags: [Office]
      summary: Katalog użytkowników własnej parafii do przyszłych scenariuszy czatu
      description: |
        Wymaga `email_verified` oraz `parish_approved`.
        Endpoint testowy, ograniczony do własnej parafii użytkownika.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: parishId
          required: true
          schema:
            type: integer
        - in: query
          name: scope
          description: Zakres filtrowania użytkowników.
          schema:
            type: string
            enum: [all, email_verified, parish_approved]
            default: all
      responses:
        '200':
          description: Katalog użytkowników własnej parafii
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      parish_id:
                        type: string
                      scope:
                        type: string
                        enum: [all, email_verified, parish_approved]
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/OfficeDirectoryUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /office/chats:
    get:
      tags: [Office]
      summary: Lista czatów kancelarii użytkownika
      description: Wymaga `email_verified` oraz `parish_approved`.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Lista czatów
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/OfficeChat'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Office]
      summary: Rozpocznij nową rozmowę z kancelarią własnej parafii
      description: Wymaga `email_verified` oraz `parish_approved`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [parish_id, message]
              properties:
                parish_id:
                  type: integer
                recipient_user_id:
                  type: [integer, 'null']
                  description: |
                    Opcjonalny identyfikator wybranego odbiorcy kancelarii z endpointu
                    `GET /office/parishes/{parishId}/staff`. Jeśli brak, backend wybiera
                    domyślnego odbiorcę o najwyższym priorytecie.
                message:
                  type: string
                  minLength: 2
                  maxLength: 5000
      responses:
        '201':
          description: Czat utworzony
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      chat:
                        $ref: '#/components/schemas/OfficeChat'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /office/chats/{chatId}/messages:
    get:
      tags: [Office]
      summary: Lista wiadomości w czacie kancelarii
      description: Wymaga `email_verified` oraz `parish_approved`.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: chatId
          required: true
          schema:
            type: integer
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        '200':
          description: Lista wiadomości
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OfficeMessage'
                  meta:
                    $ref: '#/components/schemas/CursorMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Office]
      summary: Wyślij wiadomość tekstową do kancelarii
      description: Wymaga `email_verified` oraz `parish_approved`.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: chatId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
                  minLength: 1
                  maxLength: 10000
      responses:
        '201':
          description: Wiadomość wysłana
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/OfficeMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /office/chats/{chatId}/attachments:
    post:
      tags: [Office]
      summary: Wyślij wiadomość z załącznikami do kancelarii
      description: Wymaga `email_verified` oraz `parish_approved`.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: chatId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                body:
                  type: [string, 'null']
                files:
                  type: array
                  minItems: 1
                  maxItems: 5
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Wiadomość z załącznikami wysłana
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/OfficeMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /office/chats/{chatId}/attachments/{attachmentId}:
    get:
      tags: [Office]
      summary: Pobierz załącznik kancelarii
      description: |
        Endpoint chroniony. Załącznik może pobrać wyłącznie strona danej rozmowy.
        W API mobilnym nie przewiduje się dostępu superadmina.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: chatId
          required: true
          schema:
            type: integer
        - in: path
          name: attachmentId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Plik binarny
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
