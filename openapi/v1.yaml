openapi: 3.1.0
info:
  title: Wspolnota Mobile API
  version: 1.0.0
  description: |
    API v1 dla aplikacji mobilnej parafian.
    Format czasu: ISO-8601 UTC.
    Paginacja: cursor-based. `next_cursor` jest wartością techniczną i klient nie powinien jej interpretować.
servers:
  - url: /api/v1
    description: Lokalny serwer aplikacji

tags:
  - name: Meta
  - name: Auth
  - name: Parishes
  - name: Masses
  - name: Announcements
  - name: News
  - name: Me
  - name: Devices
  - name: Notifications
  - name: Office

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token

  schemas:
    ErrorBody:
      type: object
      required: [code, message, details]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'

    ServiceVersion:
      type: object
      required: [service_version]
      properties:
        service_version:
          type: string
          example: '0.9'

    CursorMeta:
      type: object
      required: [next_cursor, has_more]
      properties:
        next_cursor:
          description: Opaque cursor token. Klient przekazuje go dalej bez dekodowania.
          type: [string, 'null']
        has_more:
          type: boolean

    User:
      type: object
      required:
        - id
        - login
        - role
        - role_key
        - first_name
        - last_name
        - email
        - is_email_verified
        - is_parish_approved
        - can_access_office
        - created_at
        - updated_at
      properties:
        id:
          type: string
        login:
          type: string
          description: Techniczny login użytkownika. Widoczny, ale niemodyfikowalny przez użytkownika.
        role:
          type: integer
          enum: [0, 1, 2]
          description: Znormalizowana rola użytkownika z `users.role`, gdzie `0` lub `null` oznacza zwykłego użytkownika, `1` administratora/proboszcza, a `2` superadmina.
        role_key:
          type: string
          enum: [user, admin, superadmin]
          description: Uproszczony klucz roli pod klienta mobilnego.
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: [string, 'null']
        default_parish_id:
          type: [string, 'null']
          description: Parafia domyślna przechowywana na serwerze.
        is_email_verified:
          type: boolean
        is_parish_approved:
          type: boolean
        can_access_office:
          type: boolean
          description: Wartość pochodna. `true` tylko gdy użytkownik ma zweryfikowany email i status parafialny.
        parish_approval_code:
          type: [string, 'null']
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Tokens:
      type: object
      required:
        - token_type
        - access_token
        - access_expires_in
        - refresh_token
        - refresh_expires_in
      properties:
        token_type:
          type: string
          enum: [Bearer]
        access_token:
          type: string
        access_expires_in:
          type: integer
          description: TTL access tokenu w sekundach
        refresh_token:
          type: string
        refresh_expires_in:
          type: integer
          description: TTL refresh tokenu w sekundach

    DeviceContext:
      type: object
      required: [platform, device_id, app_version]
      properties:
        platform:
          type: string
          enum: [ios, android]
        device_id:
          type: string
          minLength: 8
          maxLength: 128
        device_name:
          type: [string, 'null']
          maxLength: 120
        app_version:
          type: string
          maxLength: 30

    AuthSessionResponse:
      type: object
      required: [user, tokens, access_level, requires_email_verification]
      properties:
        user:
          $ref: '#/components/schemas/User'
        tokens:
          $ref: '#/components/schemas/Tokens'
        access_level:
          type: string
          enum: [AUTHENTICATED_LIMITED, AUTHENTICATED, PARISH_APPROVED]
        requires_email_verification:
          type: boolean

    ParishApprovalLookupUser:
      type: object
      required:
        - id
        - login
        - first_name
        - last_name
        - email
        - is_email_verified
        - is_parish_approved
        - can_operator_approve
      properties:
        id:
          type: string
        login:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: [string, 'null']
          format: uri
        default_parish_id:
          type: [string, 'null']
        default_parish_name:
          type: [string, 'null']
        is_email_verified:
          type: boolean
        is_parish_approved:
          type: boolean
        parish_approval_code:
          type: [string, 'null']
        can_operator_approve:
          type: boolean
          description: Informacja, czy zalogowany operator może zatwierdzić tego użytkownika w jego parafii domyślnej.

    ParishApprovalPendingUser:
      type: object
      required:
        - id
        - first_name
        - last_name
        - login
        - email
        - is_email_verified
        - is_parish_approved
        - created_at
      properties:
        id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        login:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: [string, 'null']
          format: uri
        default_parish_id:
          type: [string, 'null']
        default_parish_name:
          type: [string, 'null']
        created_at:
          type: [string, 'null']
          format: date-time
        is_email_verified:
          type: boolean
        is_parish_approved:
          type: boolean

    ParishContactVisibility:
      type: object
      required: [email, phone, website, address]
      properties:
        email:
          type: boolean
        phone:
          type: boolean
        website:
          type: boolean
        address:
          type: boolean

    ParishPublicAddress:
      type: object
      required: [street, postal_code, city]
      properties:
        street:
          type: [string, 'null']
        postal_code:
          type: [string, 'null']
        city:
          type: string

    ParishPublicContact:
      type: object
      required: [email, phone, website, address]
      properties:
        email:
          type: [string, 'null']
          format: email
        phone:
          type: [string, 'null']
        website:
          type: [string, 'null']
        address:
          oneOf:
            - $ref: '#/components/schemas/ParishPublicAddress'
            - type: 'null'

    ParishStaffMember:
      type: object
      required: [name, title]
      properties:
        name:
          type: string
        title:
          type: string

    Parish:
      type: object
      required:
        - id
        - name
        - short_name
        - slug
        - city
        - contact_visibility
        - public_contact
        - staff_members
        - is_active
      properties:
        id:
          type: string
        name:
          type: string
        short_name:
          type: string
        slug:
          type: string
        email:
          type: [string, 'null']
          format: email
        phone:
          type: [string, 'null']
        website:
          type: [string, 'null']
        street:
          type: [string, 'null']
        postal_code:
          type: [string, 'null']
        city:
          type: string
        diocese:
          type: [string, 'null']
        decanate:
          type: [string, 'null']
        contact_visibility:
          $ref: '#/components/schemas/ParishContactVisibility'
        public_contact:
          $ref: '#/components/schemas/ParishPublicContact'
        staff_members:
          type: array
          items:
            $ref: '#/components/schemas/ParishStaffMember'
        is_active:
          type: boolean
        avatar_url:
          type: [string, 'null']
        cover_url:
          type: [string, 'null']

    Mass:
      type: object
      required:
        - id
        - parish_id
        - intention_title
        - celebration_at
        - mass_kind
        - mass_type
        - status
      properties:
        id:
          type: string
        parish_id:
          type: string
        intention_title:
          type: string
        intention_details:
          type: [string, 'null']
        celebration_at:
          type: string
          format: date-time
        mass_kind:
          type: string
        mass_type:
          type: string
        status:
          type: string
        celebrant_name:
          type: [string, 'null']
        location:
          type: [string, 'null']
        attendance_count:
          type: integer
        created_at:
          type: [string, 'null']
          format: date-time
        updated_at:
          type: [string, 'null']
          format: date-time

    AnnouncementItem:
      type: object
      required: [id, position, title, content, is_important]
      properties:
        id:
          type: string
        position:
          type: integer
        title:
          type: string
        content:
          type: string
        is_important:
          type: boolean

    Announcement:
      type: object
      required:
        - id
        - parish_id
        - title
      properties:
        id:
          type: string
        parish_id:
          type: string
        title:
          type: string
        week_label:
          type: [string, 'null']
        lead:
          type: [string, 'null']
        footer_notes:
          type: [string, 'null']
        summary_ai:
          type: [string, 'null']
          description: AI-streszczenie bieżących ogłoszeń, jeżeli zostało wygenerowane.
        effective_from:
          type: [string, 'null']
          format: date
        effective_to:
          type: [string, 'null']
          format: date
        published_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: [string, 'null']
          format: date-time
        updated_at:
          type: [string, 'null']
          format: date-time
        pdf_url:
          type: string
          description: Publiczny URL PDF zestawu ogłoszeń.

    CurrentAnnouncement:
      allOf:
        - $ref: '#/components/schemas/Announcement'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/AnnouncementItem'

    News:
      type: object
      required:
        - id
        - parish_id
        - title
        - slug
        - is_pinned
        - comments_enabled
        - comments_count
      properties:
        id:
          type: string
        parish_id:
          type: string
        title:
          type: string
        slug:
          type: string
        is_pinned:
          type: boolean
        featured_image_url:
          type: [string, 'null']
        content:
          type: [string, 'null']
        comments_enabled:
          type: boolean
        comments_count:
          type: integer
        published_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: [string, 'null']
          format: date-time
        updated_at:
          type: [string, 'null']
          format: date-time

    NewsCommentUser:
      type: object
      properties:
        id:
          type: [string, 'null']
        name:
          type: [string, 'null']
        avatar_url:
          type: [string, 'null']

    NewsComment:
      type: object
      required: [id, parent_id, depth, body, is_hidden, can_reply, user, replies_count, replies]
      properties:
        id:
          type: string
        parent_id:
          type: [string, 'null']
        depth:
          type: integer
        body:
          type: [string, 'null']
        is_hidden:
          type: boolean
        can_reply:
          type: boolean
        user:
          oneOf:
            - $ref: '#/components/schemas/NewsCommentUser'
            - type: 'null'
        created_at:
          type: [string, 'null']
          format: date-time
        updated_at:
          type: [string, 'null']
          format: date-time
        replies_count:
          type: integer
        replies:
          type: array
          items:
            $ref: '#/components/schemas/NewsComment'

    NewsGalleryItem:
      type: object
      required: [id, file_name, mime_type, size, original_url, preview_url, thumb_url]
      properties:
        id:
          type: string
        file_name:
          type: string
        name:
          type: [string, 'null']
        mime_type:
          type: [string, 'null']
        size:
          type: integer
        original_url:
          type: string
        preview_url:
          type: string
        thumb_url:
          type: string
        created_at:
          type: [string, 'null']
          format: date-time

    NewsAttachmentItem:
      type: object
      required: [id, file_name, mime_type, size, download_url]
      properties:
        id:
          type: string
        file_name:
          type: string
        name:
          type: [string, 'null']
        mime_type:
          type: [string, 'null']
        size:
          type: integer
        download_url:
          type: string
        created_at:
          type: [string, 'null']
          format: date-time

    HomeFeed:
      type: object
      required: [parish, next_masses, latest_news]
      properties:
        parish:
          $ref: '#/components/schemas/Parish'
        next_masses:
          type: array
          items:
            $ref: '#/components/schemas/Mass'
        current_announcements:
          oneOf:
            - $ref: '#/components/schemas/Announcement'
            - type: 'null'
        latest_news:
          type: array
          items:
            $ref: '#/components/schemas/News'

    Device:
      type: object
      required: [id, provider, platform, app_version, created_at, updated_at]
      properties:
        id:
          type: string
        provider:
          type: string
          enum: [fcm, apns]
        platform:
          type: string
          enum: [android, ios]
        app_version:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    NotificationPreferencesInput:
      type: object
      required: [news, announcements, office_messages, parish_approval_status, auth_security]
      properties:
        news:
          $ref: '#/components/schemas/PreferenceToggle'
        announcements:
          $ref: '#/components/schemas/PreferenceToggle'
        mass_reminders:
          $ref: '#/components/schemas/PreferenceToggle'
        office_messages:
          $ref: '#/components/schemas/PreferenceToggle'
        parish_approval_status:
          $ref: '#/components/schemas/PreferenceToggle'
        auth_security:
          $ref: '#/components/schemas/PreferenceToggle'
        manual_messages:
          $ref: '#/components/schemas/PreferenceToggle'

    PreferenceToggle:
      type: object
      required: [push, email]
      properties:
        push:
          type: boolean
        email:
          type: boolean

    NotificationItem:
      type: object
      required: [id, type, title, body, data]
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - NEWS_CREATED
            - ANNOUNCEMENTS_PACKAGE_PUBLISHED
            - MASS_PENDING
            - OFFICE_MESSAGE_RECEIVED
            - PARISH_APPROVAL_STATUS_CHANGED
        title:
          type: string
        body:
          type: string
        data:
          type: object
          additionalProperties: true
        read_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: [string, 'null']
          format: date-time

    OfficeChat:
      type: object
      required: [id, uuid, parish_id, status, created_at]
      properties:
        id:
          type: string
        uuid:
          type: string
        parish_id:
          type: string
        parish_name:
          type: [string, 'null']
        status:
          type: string
          enum: [open, closed]
        recipient_user_id:
          type: [string, 'null']
        recipient:
          type: [object, 'null']
          $ref: '#/components/schemas/OfficeRecipient'
        last_message_at:
          type: [string, 'null']
          format: date-time
        last_message_preview:
          type: [string, 'null']
        created_at:
          type: [string, 'null']
          format: date-time
        updated_at:
          type: [string, 'null']
          format: date-time

    OfficeRecipient:
      type: object
      required: [id, display_name, role_key, role_label, priority]
      properties:
        id:
          type: string
        display_name:
          type: string
        avatar_url:
          type: [string, 'null']
          format: uri
        role_key:
          type: string
          enum: [pastor, moderator, assistant_admin, superadmin, admin, custom]
        role_label:
          type: string
        priority:
          type: integer

    OfficeStaffMember:
      allOf:
        - $ref: '#/components/schemas/OfficeRecipient'
        - type: object
          required: [is_default_recipient]
          properties:
            assignment_note:
              type: [string, 'null']
            is_default_recipient:
              type: boolean

    OfficeDirectoryUser:
      type: object
      required: [id, display_name, is_email_verified, is_parish_approved]
      properties:
        id:
          type: string
        display_name:
          type: string
        avatar_url:
          type: [string, 'null']
          format: uri
        default_parish_id:
          type: [string, 'null']
        is_email_verified:
          type: boolean
        is_parish_approved:
          type: boolean
        created_at:
          type: [string, 'null']
          format: date-time

    OfficeAttachment:
      type: object
      required: [id, file_name, size, download_url]
      properties:
        id:
          type: string
        file_name:
          type: string
        mime_type:
          type: [string, 'null']
        size:
          type: integer
        download_url:
          type: string
          description: Chroniony URL API dostępny wyłącznie dla strony danej rozmowy.

    OfficeMessage:
      type: object
      required: [id, chat_id, sender_user_id, has_attachments]
      properties:
        id:
          type: string
        chat_id:
          type: string
        sender_user_id:
          type: string
        body:
          type: [string, 'null']
        has_attachments:
          type: boolean
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/OfficeAttachment'
        created_at:
          type: [string, 'null']
          format: date-time
        updated_at:
          type: [string, 'null']
          format: date-time

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  /openapi.yaml:
    get:
      tags: [Meta]
      summary: Pobierz specyfikację OpenAPI
      responses:
        '200':
          description: YAML spec

  /meta/service-version:
    get:
      tags: [Meta]
      summary: Zwraca numer wersji uslugi Wspolnota
      operationId: getServiceVersion
      responses:
        '200':
          description: Aktualny numer wersji uslugi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceVersion'

  /auth/register:
    post:
      tags: [Auth]
      summary: Rejestracja użytkownika
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, email, password, password_confirmation]
              properties:
                first_name:
                  type: string
                  minLength: 2
                  maxLength: 80
                last_name:
                  type: string
                  minLength: 2
                  maxLength: 80
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 10
                  maxLength: 72
                password_confirmation:
                  type: string
                default_parish_id:
                  type: [integer, 'null']
                device:
                  $ref: '#/components/schemas/DeviceContext'
      responses:
        '201':
          description: Użytkownik zarejestrowany
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthSessionResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Logowanie przez email lub login techniczny
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password, device]
              properties:
                login:
                  type: string
                  description: Email albo techniczny login użytkownika.
                password:
                  type: string
                device:
                  $ref: '#/components/schemas/DeviceContext'
      responses:
        '200':
          description: Zalogowano
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotacja refresh tokenu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Odświeżono sesję
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Wylogowanie bieżącej sesji
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Wylogowano
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [LOGGED_OUT]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Wylogowanie ze wszystkich urządzeń
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        '200':
          description: Wylogowano wszystkie sesje
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [LOGGED_OUT_ALL]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Wyślij link resetu hasła
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
