openapi: 3.1.0
info:
  title: Wspolnota Mobile API
  version: 1.0.0
  description: |
    API v1 dla aplikacji mobilnej parafian (Flutter).
    Format czasu: ISO-8601 UTC.
servers:
  - url: /api/v1
    description: Lokalny serwer aplikacji

tags:
  - name: Auth
  - name: Parishes
  - name: Masses
  - name: Announcements
  - name: News
  - name: Me
  - name: Devices
  - name: Notifications
  - name: Office
  - name: Meta

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token

  schemas:
    ErrorBody:
      type: object
      required: [code, message, details]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'

    CursorMeta:
      type: object
      required: [next_cursor, has_more]
      properties:
        next_cursor:
          type: [string, 'null']
        has_more:
          type: boolean

    User:
      type: object
      required:
        - id
        - first_name
        - last_name
        - email
        - is_email_verified
        - is_parish_approved
        - created_at
        - updated_at
      properties:
        id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: [string, 'null']
        default_parish_id:
          type: [string, 'null']
        is_email_verified:
          type: boolean
        is_parish_approved:
          type: boolean
        parish_approval_code:
          type: [string, 'null']
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Tokens:
      type: object
      required:
        - token_type
        - access_token
        - access_expires_in
        - refresh_token
        - refresh_expires_in
      properties:
        token_type:
          type: string
          enum: [Bearer]
        access_token:
          type: string
        access_expires_in:
          type: integer
          description: TTL access tokenu w sekundach
        refresh_token:
          type: string
        refresh_expires_in:
          type: integer
          description: TTL refresh tokenu w sekundach

    Parish:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        short_name: { type: string }
        slug: { type: string }
        city: { type: string }
        diocese: { type: [string, 'null'] }
        decanate: { type: [string, 'null'] }
        avatar_url: { type: [string, 'null'] }
        cover_url: { type: [string, 'null'] }

    Mass:
      type: object
      properties:
        id: { type: string }
        parish_id: { type: string }
        intention_title: { type: string }
        intention_details: { type: [string, 'null'] }
        celebration_at: { type: string, format: date-time }
        mass_kind: { type: string }
        mass_type: { type: string }
        status: { type: string }
        celebrant_name: { type: [string, 'null'] }
        location: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Announcement:
      type: object
      properties:
        id: { type: string }
        parish_id: { type: string }
        title: { type: string }
        week_label: { type: [string, 'null'] }
        lead: { type: [string, 'null'] }
        footer_notes: { type: [string, 'null'] }
        effective_from: { type: [string, 'null'], format: date }
        effective_to: { type: [string, 'null'], format: date }
        published_at: { type: [string, 'null'], format: date-time }
        created_at: { type: [string, 'null'], format: date-time }
        updated_at: { type: [string, 'null'], format: date-time }

    News:
      type: object
      properties:
        id: { type: string }
        parish_id: { type: string }
        title: { type: string }
        slug: { type: string }
        is_pinned: { type: boolean }
        featured_image_url: { type: [string, 'null'] }
        content: { type: [string, 'null'] }
        comments_count: { type: integer }
        published_at: { type: [string, 'null'], format: date-time }
        created_at: { type: [string, 'null'], format: date-time }
        updated_at: { type: [string, 'null'], format: date-time }

    NewsComment:
      type: object
      properties:
        id: { type: string }
        body: { type: string }
        user:
          type: object
          properties:
            id: { type: [string, 'null'] }
            name: { type: [string, 'null'] }
            avatar_url: { type: [string, 'null'] }
        created_at: { type: [string, 'null'], format: date-time }
        updated_at: { type: [string, 'null'], format: date-time }

    OfficeMessage:
      type: object
      properties:
        id: { type: string }
        chat_id: { type: string }
        sender_user_id: { type: string }
        body: { type: [string, 'null'] }
        has_attachments: { type: boolean }
        attachments:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              file_name: { type: string }
              mime_type: { type: [string, 'null'] }
              size: { type: integer }
              download_url: { type: string }
        created_at: { type: [string, 'null'], format: date-time }
        updated_at: { type: [string, 'null'], format: date-time }

    NotificationItem:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        title: { type: string }
        body: { type: string }
        data:
          type: object
          additionalProperties: true
        read_at: { type: [string, 'null'], format: date-time }
        created_at: { type: [string, 'null'], format: date-time }

    DeviceInput:
      type: object
      required: [provider, platform, push_token, device_id, app_version]
      properties:
        provider:
          type: string
          enum: [fcm, apns]
        platform:
          type: string
          enum: [android, ios]
        push_token:
          type: string
          maxLength: 4096
        device_id:
          type: string
          minLength: 8
          maxLength: 128
        device_name:
          type: [string, 'null']
          maxLength: 120
        app_version:
          type: string
          maxLength: 30
        locale:
          type: [string, 'null']
          maxLength: 16
        timezone:
          type: [string, 'null']
          maxLength: 64

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  /openapi.yaml:
    get:
      tags: [Meta]
      summary: Pobierz specyfikację OpenAPI
      responses:
        '200':
          description: YAML spec

  /auth/register:
    post:
      tags: [Auth]
      summary: Rejestracja użytkownika
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, email, password, password_confirmation]
              properties:
                first_name: { type: string, minLength: 2, maxLength: 80 }
                last_name: { type: string, minLength: 2, maxLength: 80 }
                email: { type: string, format: email }
                password: { type: string, minLength: 10, maxLength: 72 }
                password_confirmation: { type: string }
                default_parish_id: { type: [integer, 'null'] }
                device:
                  type: object
                  properties:
                    platform: { type: string, enum: [ios, android] }
                    device_id: { type: string }
                    device_name: { type: [string, 'null'] }
                    app_version: { type: string }
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user: { $ref: '#/components/schemas/User' }
                      tokens: { $ref: '#/components/schemas/Tokens' }
                      access_level: { type: string }
                      requires_email_verification: { type: boolean }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Logowanie (email lub login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password, device]
              properties:
                login: { type: string }
                password: { type: string }
                device:
                  type: object
                  required: [platform, device_id, app_version]
                  properties:
                    platform: { type: string, enum: [ios, android] }
                    device_id: { type: string }
                    device_name: { type: [string, 'null'] }
                    app_version: { type: string }
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user: { $ref: '#/components/schemas/User' }
                      tokens: { $ref: '#/components/schemas/Tokens' }
                      access_level: { type: string }
                      requires_email_verification: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Odświeżenie tokenów (rotating refresh)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: Rotated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user: { $ref: '#/components/schemas/User' }
                      tokens: { $ref: '#/components/schemas/Tokens' }
                      access_level: { type: string }
                      requires_email_verification: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [Auth]
      security: [{ BearerAuth: [] }]
      summary: Wylogowanie bieżącej sesji
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status: { type: string, enum: [LOGGED_OUT] }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout-all:
    post:
      tags: [Auth]
      security: [{ BearerAuth: [] }]
      summary: Wylogowanie wszystkich sesji
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string }
      responses:
        '200':
          description: Logged out all
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status: { type: string, enum: [LOGGED_OUT_ALL] }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Wyślij mail resetu hasła
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [PASSWORD_RESET_EMAIL_SENT_IF_EXISTS]

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Zresetuj hasło
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, token, password, password_confirmation]
              properties:
                email: { type: string, format: email }
                token: { type: string }
                password: { type: string, minLength: 10, maxLength: 72 }
                password_confirmation: { type: string }
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status: { type: string, enum: [PASSWORD_RESET] }
        '400':
          description: Invalid reset token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /parishes:
    get:
      tags: [Parishes]
      summary: Lista parafii
      parameters:
        - in: query
          name: query
          schema: { type: string }
      responses:
        '200':
          description: Parish list

  /parishes/{parishId}:
    get:
      tags: [Parishes]
      summary: Szczegóły parafii
      parameters:
        - in: path
          name: parishId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Parish details }
        '404': { $ref: '#/components/responses/NotFound' }

  /parishes/{parishId}/home-feed:
    get:
      tags: [Parishes]
      summary: Home feed parafii
      parameters:
        - in: path
          name: parishId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Home feed }

  /parishes/{parishId}/masses:
    get:
      tags: [Masses]
      summary: Lista mszy
      parameters:
        - in: path
          name: parishId
          required: true
          schema: { type: integer }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Cursor list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Mass' }
                  meta: { $ref: '#/components/schemas/CursorMeta' }

  /parishes/{parishId}/masses/{massId}:
    get:
      tags: [Masses]
      summary: Szczegóły mszy
      parameters:
        - in: path
          name: parishId
          required: true
          schema: { type: integer }
        - in: path
          name: massId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Mass details }

  /parishes/{parishId}/masses/{massId}/attendance:
    post:
      tags: [Masses]
      security: [{ BearerAuth: [] }]
      summary: Zapisz obecność
      parameters:
        - in: path
          name: parishId
          required: true
          schema: { type: integer }
        - in: path
          name: massId
          required: true
          schema: { type: integer }
      responses:
        '201': { description: Attendance registered }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [Masses]
      security: [{ BearerAuth: [] }]
      summary: Usuń obecność
      parameters:
        - in: path
          name: parishId
          required: true
          schema: { type: integer }
        - in: path
          name: massId
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Removed }

  /parishes/{parishId}/announcements/current:
    get:
      tags: [Announcements]
      summary: Bieżący pakiet ogłoszeń
      parameters:
        - in: path
          name: parishId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Current announcement set }

  /parishes/{parishId}/announcements:
    get:
      tags: [Announcements]
      summary: Lista pakietów ogłoszeń
      parameters:
        - in: path
          name: parishId
          required: true
          schema: { type: integer }
        - in: query
          name: period
          schema:
            type: string
            enum: [past, future]
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Cursor list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Announcement' }
                  meta: { $ref: '#/components/schemas/CursorMeta' }

  /parishes/{parishId}/announcements/{packageId}/pdf:
    get:
      tags: [Announcements]
      summary: PDF pakietu ogłoszeń
      parameters:
        - in: path
          name: parishId
          required: true
          schema: { type: integer }
        - in: path
          name: packageId
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /parishes/{parishId}/news:
    get:
      tags: [News]
      summary: Lista aktualności
      parameters:
        - in: path
          name: parishId
          required: true
          schema: { type: integer }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Cursor list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/News' }
                  meta: { $ref: '#/components/schemas/CursorMeta' }

  /parishes/{parishId}/news/{newsId}:
    get:
      tags: [News]
      summary: Szczegóły aktualności
      parameters:
        - in: path
          name: parishId
          required: true
          schema: { type: integer }
        - in: path
          name: newsId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: News details }

  /parishes/{parishId}/news/{newsId}/comments:
    get:
      tags: [News]
      summary: Lista komentarzy
      parameters:
        - in: path
          name: parishId
          required: true
          schema: { type: integer }
        - in: path
          name: newsId
          required: true
          schema: { type: integer }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Cursor list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/NewsComment' }
                  meta: { $ref: '#/components/schemas/CursorMeta' }

    post:
      tags: [News]
      security: [{ BearerAuth: [] }]
      summary: Dodaj komentarz
      parameters:
        - in: path
          name: parishId
          required: true
          schema: { type: integer }
        - in: path
          name: newsId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, minLength: 1, maxLength: 2000 }
      responses:
        '201': { description: Comment created }

  /parishes/{parishId}/news/{newsId}/comments/{commentId}:
    delete:
      tags: [News]
      security: [{ BearerAuth: [] }]
      summary: Usuń komentarz
      parameters:
        - in: path
          name: parishId
          required: true
          schema: { type: integer }
        - in: path
          name: newsId
          required: true
          schema: { type: integer }
        - in: path
          name: commentId
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Deleted }

  /me:
    get:
      tags: [Me]
      security: [{ BearerAuth: [] }]
      summary: Profil bieżącego użytkownika
      responses:
        '200': { description: Current user }
    patch:
      tags: [Me]
      security: [{ BearerAuth: [] }]
      summary: Aktualizacja profilu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                default_parish_id: { type: [integer, 'null'] }
      responses:
        '200': { description: Updated }

  /me/avatar:
    post:
      tags: [Me]
      security: [{ BearerAuth: [] }]
      summary: Upload avatara
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '201': { description: Uploaded }
    delete:
      tags: [Me]
      security: [{ BearerAuth: [] }]
      summary: Usuń avatar
      responses:
        '204': { description: Deleted }

  /me/parish-approval-code/regenerate:
    post:
      tags: [Me]
      security: [{ BearerAuth: [] }]
      summary: Regeneruj kod zatwierdzenia parafialnego
      responses:
        '200': { description: Code regenerated }

  /me/devices:
    post:
      tags: [Devices]
      security: [{ BearerAuth: [] }]
      summary: Rejestracja tokenu push
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceInput'
      responses:
        '200': { description: Device upserted }

  /me/devices/{deviceId}:
    delete:
      tags: [Devices]
      security: [{ BearerAuth: [] }]
      summary: Usuń urządzenie
      parameters:
        - in: path
          name: deviceId
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /me/notification-preferences:
    patch:
      tags: [Notifications]
      security: [{ BearerAuth: [] }]
      summary: Aktualizacja preferencji notyfikacji
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [news, announcements, office_messages, parish_approval_status, auth_security]
              properties:
                news:
                  type: object
                  required: [push, email]
                  properties:
                    push: { type: boolean }
                    email: { type: boolean }
                announcements:
                  type: object
                  required: [push, email]
                  properties:
                    push: { type: boolean }
                    email: { type: boolean }
                office_messages:
                  type: object
                  required: [push, email]
                  properties:
                    push: { type: boolean }
                    email: { type: boolean }
                parish_approval_status:
                  type: object
                  required: [push, email]
                  properties:
                    push: { type: boolean }
                    email: { type: boolean }
                auth_security:
                  type: object
                  required: [push, email]
                  properties:
                    push: { type: boolean }
                    email: { type: boolean }
      responses:
        '200': { description: Updated }

  /me/notifications:
    get:
      tags: [Notifications]
      security: [{ BearerAuth: [] }]
      summary: Lista notyfikacji użytkownika
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Cursor list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/NotificationItem' }
                  meta: { $ref: '#/components/schemas/CursorMeta' }

  /me/notifications/{id}/read:
    post:
      tags: [Notifications]
      security: [{ BearerAuth: [] }]
      summary: Oznacz notyfikację jako przeczytaną
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Marked as read }

  /office/chats:
    get:
      tags: [Office]
      security: [{ BearerAuth: [] }]
      summary: Lista konwersacji kancelarii (wymaga zatwierdzenia parafialnego)
      responses:
        '200': { description: Chat list }
    post:
      tags: [Office]
      security: [{ BearerAuth: [] }]
      summary: Inicjacja konwersacji przez użytkownika
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [parish_id, message]
              properties:
                parish_id: { type: integer }
                message: { type: string, minLength: 1, maxLength: 5000 }
      responses:
        '201': { description: Chat created }

  /office/chats/{chatId}/messages:
    get:
      tags: [Office]
      security: [{ BearerAuth: [] }]
      summary: Lista wiadomości konwersacji
      parameters:
        - in: path
          name: chatId
          required: true
          schema: { type: integer }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Cursor list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/OfficeMessage' }
                  meta: { $ref: '#/components/schemas/CursorMeta' }

    post:
      tags: [Office]
      security: [{ BearerAuth: [] }]
      summary: Wyślij wiadomość tekstową
      parameters:
        - in: path
          name: chatId
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                body: { type: string, maxLength: 5000 }
      responses:
        '201': { description: Message created }

  /office/chats/{chatId}/attachments:
    post:
      tags: [Office]
      security: [{ BearerAuth: [] }]
      summary: Wyślij wiadomość z załącznikami
      parameters:
        - in: path
          name: chatId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                body: { type: [string, 'null'] }
                files:
                  type: array
                  minItems: 1
                  maxItems: 5
                  items:
                    type: string
                    format: binary
      responses:
        '201': { description: Message with attachments created }
